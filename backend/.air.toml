root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/main"
  cmd = "go build -o ./tmp/main ./cmd/gekko"
  delay = 500
  exclude_dir = ["tmp", "uploads", "internal/db"]
  exclude_regex = ["_test\\.go"]
  include_ext = ["go", "tpl", "tmpl", "html", "sql"]
  log = "build-errors.log"
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = false
