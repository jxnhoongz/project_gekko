services:
  postgres:
    image: postgres:15-alpine
    container_name: gekko_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: gekko
      POSTGRES_USER: gekko
      POSTGRES_PASSWORD: gekko
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gekko"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
